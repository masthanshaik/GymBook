# Render Blueprint — deploys backend API, frontend, and PostgreSQL together.
# In Render: New → Blueprint → connect your repo → it reads this file.
services:
  # ---- Backend API (FastAPI) ----
  - type: web
    name: gymbook-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gymbook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random key
      - key: DEBUG
        value: "false"
      - key: FRONTEND_ORIGINS
        sync: false                  # you set this to your frontend URL after first deploy

  # ---- Frontend (static site, built by Vite) ----
  - type: web
    name: gymbook-web
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build:css && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false                  # you set this to your API URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: gymbook-db
    plan: free
    databaseName: gymbook_db
    user: gymbook
